<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Plus Jakarta Sans",sans-serif;
}

/* DESKTOP BACKGROUND */

body{
background:#f4f6f7;
}

.auth-wrapper{
display:flex;
min-height:100vh;
}

.auth-form{
flex:1;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.form-box{
width:380px;
}

/* STACKLY LOGO */

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:150px;
}

/* TITLE */

.form-box h2{
margin-bottom:25px;
text-align:center;
}

/* INPUT */

.input-group{
margin-bottom:18px;
position:relative;
}

.input-group input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
}

.error{
color:red;
font-size:13px;
margin-top:4px;
}

/* PASSWORD ICON */

.toggle-password{
position:absolute;
right:12px;
top:12px;
cursor:pointer;
}

/* TERMS */

.terms-box{
font-size:14px;
margin-bottom:15px;
}

.terms-box input{
margin-right:6px;
}

.terms-box a{
color:#104042;
font-weight:600;
text-decoration:none;
}

/* BUTTON */

.signup-btn{
width:100%;
padding:12px;
background:#104042;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

/* SUCCESS MESSAGE */

.success-box{
display:none;
margin-top:20px;
padding:12px;
background:#d4edda;
color:#155724;
border-radius:6px;
text-align:center;
font-weight:600;
}

/* FOOTER */

.auth-footer{
margin-top:18px;
text-align:center;
}

.auth-footer a{
color:#104042;
font-weight:600;
text-decoration:none;
}

/* IMAGE */

.auth-image{
flex:1;
background:#0f4c4c;
display:flex;
align-items:center;
justify-content:center;
}

.auth-image img{
width:70%;
}

/* RAINBOW ANIMATION */

@keyframes rainbowMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* MOBILE VIEW */

@media(max-width:900px){

body{

background: linear-gradient(
270deg,
#ff6ec4,
#7873f5,
#4facfe,
#43e97b,
#f9d423
);

background-size:800% 800%;

animation:rainbowMove 12s ease infinite;

}

/* remove white layer so rainbow shows */

.auth-form{
background:transparent;
}

.auth-wrapper{
flex-direction:column;
}

.auth-image{
display:none;
}

.form-box{
background:#fff;
padding:30px;
border-radius:12px;
}

}


/* STACKLY LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#000;

display:flex;
align-items:center;
justify-content:center;

z-index:9999;
}

.loader-box{
text-align:center;
color:#fff;
}


.loader-logo{
width:200px;
margin-bottom:35px;
}

/* PROGRESS BAR */

.progress-bar{
width:220px;
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
margin:auto;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffd5,#00aaff);
transition:width 0.1s linear;
}

#percent{
margin-top:10px;
font-size:16px;
}

</style>

</head>

<body>


    
<!-- STACKLY LOADER -->
<div id="loader">

<div class="loader-box">

<img src="images/loo.webp" class="loader-logo">

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<p id="percent">0%</p>

</div>

</div>


<div class="auth-wrapper">

<div class="auth-form">

<div class="form-box">

<!-- STACKLY LOGO -->
<div class="logo">
<a href="index.html">
<img src="images/logo.webp" alt="Stackly Logo">
</a>
</div>

<h2>Create Account</h2>

<form id="registerForm">

<div class="input-group">
<input type="text" id="name" placeholder="Full Name*">
<span class="error" id="nameError"></span>
</div>

<div class="input-group">
<input type="text" id="email" placeholder="Email Address*">
<span class="error" id="emailError"></span>
</div>

<div class="input-group">

<input type="password" id="password" placeholder="Password*">

<span class="toggle-password" onclick="togglePassword()">👁</span>

<span class="error" id="passwordError"></span>

</div>

<div class="input-group">

<input type="password" id="confirmPassword" placeholder="Confirm Password*">

<span class="toggle-password" onclick="toggleConfirm()">👁</span>

<span class="error" id="confirmError"></span>

</div>

<div class="terms-box">

<label>
<input type="checkbox" id="terms">
I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
</label>

<span class="error" id="termsError"></span>

</div>

<button class="signup-btn">Sign Up</button>

</form>

<div id="successMessage" class="success-box">
Account Created Successfully ✔
</div>

<div class="auth-footer">
Already have an account? <a href="login.html">Login</a>
</div>

</div>

</div>

<div class="auth-image">
<img src="images/b1 (15).webp">
</div>

</div>

<script>

function togglePassword(){
let pass=document.getElementById("password");
pass.type = pass.type==="password" ? "text" : "password";
}

function toggleConfirm(){
let pass=document.getElementById("confirmPassword");
pass.type = pass.type==="password" ? "text" : "password";
}

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value.trim();
let confirm=document.getElementById("confirmPassword").value.trim();
let terms=document.getElementById("terms").checked;

let emailRegex=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

document.getElementById("nameError").innerText="";
document.getElementById("emailError").innerText="";
document.getElementById("passwordError").innerText="";
document.getElementById("confirmError").innerText="";
document.getElementById("termsError").innerText="";

let valid=true;

if(name===""){
document.getElementById("nameError").innerText="Enter your name";
valid=false;
}

if(email===""){
document.getElementById("emailError").innerText="Enter email";
valid=false;
}
else if(!emailRegex.test(email)){
document.getElementById("emailError").innerText="Invalid email";
valid=false;
}

if(password===""){
document.getElementById("passwordError").innerText="Enter password";
valid=false;
}

if(confirm===""){
document.getElementById("confirmError").innerText="Confirm password";
valid=false;
}

if(password!==confirm){
document.getElementById("confirmError").innerText="Passwords do not match";
valid=false;
}

if(!terms){
document.getElementById("termsError").innerText="Accept Terms & Conditions";
valid=false;
}

if(valid){

document.getElementById("successMessage").style.display="block";

setTimeout(function(){
window.location.href="login.html";
},2000);

}

});

</script>

<script>

let width = 0;

const progress = document.getElementById("progress");
const percentText = document.getElementById("percent");

const loaderInterval = setInterval(function(){

width++;

progress.style.width = width + "%";
percentText.innerText = width + "%";

if(width >= 100){

clearInterval(loaderInterval);

document.getElementById("loader").style.display = "none";

}

},15);

</script>



</body>
</html>
