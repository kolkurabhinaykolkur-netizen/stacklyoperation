<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* Background */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0b001c,#240046,#3c096c);
color:white;
}

/* Container */

.error-container{
text-align:center;
max-width:800px;
padding:20px;
}

/* Image */

.error-img{
width:100%;
max-width:500px;
margin-bottom:30px;
animation:float 4s ease-in-out infinite;
}

/* Animation */

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}
}

/* Title */

.error-title{
font-size:55px;
font-weight:700;
margin-bottom:10px;
}

.error-title span{
color:#ff7b54;
}

/* Text */

.error-text{
font-size:18px;
opacity:0.8;
margin-bottom:30px;
}

/* Button */

.home-btn{
display:inline-block;
padding:14px 35px;
background:#ffd200;
color:#104042;
text-decoration:none;
border-radius:30px;
font-weight:600;
transition:0.3s;
}

.home-btn:hover{
background:#fff;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="error-container">

<img src="images/pppp.webp" class="error-img" alt="404 Image">

<h1 class="error-title">Oops Page <span>Not Found!</span></h1>

<p class="error-text">
The page you are looking for might have been removed,
had its name changed or is temporarily unavailable.
</p>

<a href="home2.html" class="home-btn">Go Back Home</a>

</div>

</body>
</html>
