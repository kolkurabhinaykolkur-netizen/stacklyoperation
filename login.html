<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Login</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Plus Jakarta Sans",sans-serif;
}

/* DESKTOP BACKGROUND */

body{
background:#f4f6f7;
}

.auth-wrapper{
display:flex;
min-height:100vh;
}

/* LEFT FORM */

.auth-form{
flex:1;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.form-box{
width:380px;
}

/* LOGO */

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:150px;
}

/* TITLE */

.form-box h2{
margin-bottom:25px;
font-size:28px;
text-align:center;
}

/* INPUT */

.input-group{
margin-bottom:18px;
position:relative;
}

.input-group input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
}

.error{
color:red;
font-size:13px;
margin-top:4px;
}

/* PASSWORD ICON */

.toggle-password{
position:absolute;
right:12px;
top:12px;
cursor:pointer;
}

/* OPTIONS */

.login-options{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:15px;
}

.login-options a{
color:#104042;
text-decoration:none;
}

/* BUTTON */

.login-btn{
width:100%;
padding:12px;
background:#104042;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

/* FOOTER */

.auth-footer{
margin-top:18px;
font-size:14px;
text-align:center;
}

.auth-footer a{
color:#104042;
font-weight:600;
text-decoration:none;
}

/* IMAGE */

.auth-image{
flex:1;
background:#0f4c4c;
display:flex;
align-items:center;
justify-content:center;
}

.auth-image img{
width:70%;
}

/* RAINBOW ANIMATION */

@keyframes rainbowMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* MOBILE */

@media(max-width:900px){

body{

background: linear-gradient(
270deg,
#ff6ec4,
#7873f5,
#4facfe,
#43e97b,
#f9d423
);

background-size:800% 800%;

animation:rainbowMove 12s ease infinite;

}

/* remove white block so rainbow shows */

.auth-form{
background:transparent;
}

.auth-wrapper{
flex-direction:column;
}

.auth-image{
display:none;
}

.form-box{

background:#fff;
padding:30px;
border-radius:12px;

}

}




/* STACKLY LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#000;

display:flex;
align-items:center;
justify-content:center;

z-index:9999;
}

.loader-box{
text-align:center;
color:#fff;
}


.loader-logo{
width:200px;
margin-bottom:35px;
}

/* PROGRESS BAR */

.progress-bar{
width:220px;
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
margin:auto;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffd5,#00aaff);
transition:width 0.1s linear;
}

#percent{
margin-top:10px;
font-size:16px;
}

</style>

</head>

<body>


<!-- STACKLY LOADER -->
<div id="loader">

<div class="loader-box">

<img src="images/loo.webp" class="loader-logo">

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<p id="percent">0%</p>

</div>

</div>
<!-- Your page content starts here -->
<div class="auth-wrapper">




<!-- LEFT LOGIN FORM -->
<div class="auth-form">

<div class="form-box">

<!-- STACKLY LOGO -->
<div class="logo">
<a href="index.html">
<img src="images/logo.webp" alt="Stackly Logo">
</a>
</div>

<h2>Welcome back</h2>

<form id="loginForm">

<div class="input-group">
<input type="text" id="email" placeholder="Email Address*">
<span class="error" id="emailError"></span>
</div>

<div class="input-group">

<input type="password" id="password" placeholder="Password*">

<span class="toggle-password" onclick="togglePassword()">👁</span>

<span class="error" id="passwordError"></span>

</div>

<div class="login-options">

<label>
<input type="checkbox"> Remember me
</label>

<a href="#">Forgot Password?</a>

</div>

<button class="login-btn">Sign In</button>

</form>

<div class="auth-footer">
Don't have an account? <a href="register.html">Sign up</a>
</div>

</div>

</div>

<!-- RIGHT IMAGE -->
<div class="auth-image">
<img src="images/b1 (1).webp">
</div>

</div>

<script>

/* PASSWORD TOGGLE */

function togglePassword(){

let pass=document.getElementById("password");

pass.type = pass.type === "password" ? "text" : "password";

}

/* FORM VALIDATION */

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let email=document.getElementById("email").value.trim();
let password=document.getElementById("password").value.trim();

let emailRegex=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

document.getElementById("emailError").innerText="";
document.getElementById("passwordError").innerText="";

let valid=true;

if(email===""){
document.getElementById("emailError").innerText="Enter email";
valid=false;
}
else if(!emailRegex.test(email)){
document.getElementById("emailError").innerText="Invalid email";
valid=false;
}

if(password===""){
document.getElementById("passwordError").innerText="Enter password";
valid=false;
}

if(valid){

window.location.href="dashboard.html";

}

});

</script>




<script>

let width = 0;

const progress = document.getElementById("progress");
const percentText = document.getElementById("percent");

const loaderInterval = setInterval(function(){

width++;

progress.style.width = width + "%";
percentText.innerText = width + "%";

if(width >= 100){

clearInterval(loaderInterval);

document.getElementById("loader").style.display = "none";

}

},15);

</script>

</body>
</html>
